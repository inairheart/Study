<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지율이의 미션 체크</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Noto Sans KR',sans-serif;background:#FFF9F0;min-height:100vh}
/* 헤더 */
.hd{background:linear-gradient(135deg,#FFB300,#FF8F00);padding:13px 18px;display:flex;align-items:center;justify-content:space-between}
.hd-left{display:flex;align-items:center;gap:9px}
.hd-icon{font-size:28px;cursor:pointer;transition:transform .15s;user-select:none}
.hd-icon:hover{transform:scale(1.18)}
.hd-title{color:#fff;font-size:17px;font-weight:800;outline:none;cursor:text;border-bottom:2px solid transparent;transition:border-color .2s;min-width:40px}
.hd-title:focus{border-bottom:2px solid rgba(255,255,255,.7)}
.hd-badge{background:rgba(255,255,255,.25);border-radius:20px;padding:5px 11px;color:#fff;font-size:11px;font-weight:700;white-space:nowrap}
/* 네비 */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #eee;display:flex;z-index:50}
.nav-btn{flex:1;padding:9px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:10px;font-weight:700;color:#aaa;border:none;background:none}
.nav-btn .ni{font-size:22px}
.nav-btn.on{color:#FFB300}
/* 페이지 */
.pg{display:none;padding:13px 13px 78px;max-width:700px;margin:0 auto}
.pg.on{display:block}
/* 카드 */
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:13px;border:2px solid #eee}
/* 탭 */
.tab-header{background:#fff;border-radius:16px 16px 0 0;border:2px solid #eee;border-bottom:none}
.tabs{display:flex;overflow-x:auto;padding:0 10px;border-bottom:2px solid #eee}
.tab{padding:10px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;color:#999;transition:all .2s}
.tab.on{color:#FFB300;border-bottom-color:#FFB300}
.tab-add{padding:10px 11px;color:#FFB300;font-size:20px;cursor:pointer;font-weight:700}
.tab-body{background:#fff;border:2px solid #eee;border-top:none;border-radius:0 0 16px 16px;padding:15px;margin-bottom:13px}
/* 캐릭터 */
.mascot-wrap{text-align:center;padding:10px 0 4px}
.mascot-float{animation:mf 3s ease-in-out infinite;display:inline-block}
@keyframes mf{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.gift-inp{width:100%;max-width:260px;margin-top:8px;padding:8px 12px;border:2px solid #FFD700;border-radius:11px;font-size:13px;text-align:center;outline:none;font-family:inherit;background:#FFFBE6}
.gift-inp:focus{border-color:#FFB300}
.gift-inp::placeholder{color:#ccc}
/* 진행바 */
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.prog-label{font-size:13px;font-weight:700;color:#444}
.prog-pct{font-size:16px;font-weight:800}
.bar-bg{background:#fff;border:1.5px solid #eee;border-radius:7px;height:13px;overflow:hidden}
.bar-fill{height:100%;border-radius:7px;transition:width .5s cubic-bezier(.34,1.56,.64,1);position:relative}
.bar-fill::after{content:'';position:absolute;top:2px;left:5px;right:5px;height:3px;background:rgba(255,255,255,.4);border-radius:2px}
.sub-bars{display:flex;gap:7px;margin-top:6px}
.sbi{flex:1;text-align:center;font-size:10px;color:#999}
.sbb{height:5px;border-radius:3px;margin-bottom:2px;background:#fff;border:1px solid #eee}
.sbf{height:100%;border-radius:3px;transition:width .5s}
/* 블럭 */
.grid-title{font-size:12px;font-weight:700;color:#999;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.edit-btn{font-size:11px;font-weight:700;border:none;border-radius:7px;padding:4px 8px;cursor:pointer}
.blocks{display:flex;flex-wrap:wrap;gap:5px}
.blk{width:50px;height:50px;border-radius:11px;border:2px solid #eee;background:#F7F7F7;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#ccc;transition:all .15s;user-select:none;position:relative}
.blk:hover{transform:scale(1.08)}
.blk:active{transform:scale(.95)}
.blk.d1{background:#FFF0A3;border-color:#FFD700}
.blk.d2{background:#C8F5A0;border-color:#58CC02}
.blk.pop{animation:bp .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes bp{0%{transform:scale(1)}50%{transform:scale(1.22)}100%{transform:scale(1)}}
.blk .trp{display:none}
.blk.d2 .trp{display:flex;align-items:center;justify-content:center;width:100%;height:100%;animation:tp .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes tp{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0deg)}}
.blk .bdt{font-size:8.5px;font-weight:800}
/* 범례 */
.legend{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:9px}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.ld{width:13px;height:13px;border-radius:3px;border:2px solid}
.ld.l0{background:#F7F7F7;border-color:#eee}
.ld.l1{background:#FFF0A3;border-color:#FFD700}
.ld.l2{background:#C8F5A0;border-color:#58CC02}
/* 목표 */
.goal-card{background:linear-gradient(135deg,#FFF3CD,#FFF9E0);border-color:#FFD700}
.goal-row{display:flex;justify-content:space-between;align-items:center}
/* 완료 */
.done-card{background:#fff;border-radius:16px;padding:15px;margin-bottom:11px;border:2px solid #C8F5A0}
/* 타이머 */
.mode-btns{display:flex;gap:7px;margin-bottom:14px}
.mbtn{flex:1;padding:9px;border-radius:11px;border:2px solid #eee;background:#fff;font-size:13px;font-weight:700;cursor:pointer;color:#999}
.mbtn.on{border-color:#FFB300;background:#FFF8E1;color:#FFB300}
.tdisp{font-size:68px;font-weight:800;color:#333;letter-spacing:-2px;margin:18px 0;font-variant-numeric:tabular-nums;text-align:center}
.tdisp.run{color:#FFB300}
.tdisp.done{color:#58CC02;animation:pulse .8s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.t-btns{display:flex;gap:9px;justify-content:center;margin-bottom:18px}
.tbtn{padding:11px 26px;border-radius:13px;border:none;font-size:14px;font-weight:800;cursor:pointer}
.tbtn.go{background:#FFB300;color:#fff}
.tbtn.stop{background:#FF6B6B;color:#fff}
.tbtn.rst{background:#eee;color:#666}
.preset-btns{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.pbtn{padding:7px 13px;border-radius:9px;border:2px solid #eee;background:#fff;font-size:12px;font-weight:700;color:#666;cursor:pointer}
.pbtn.on,.pbtn:hover{border-color:#FFB300;color:#FFB300;background:#FFF8E1}
.ctime{display:flex;gap:7px;align-items:center;justify-content:center;margin-bottom:14px}
.ctime input{width:60px;padding:7px;border:2px solid #eee;border-radius:9px;font-size:14px;font-weight:700;text-align:center;outline:none;font-family:inherit}
.ctime input:focus{border-color:#FFB300}
.ctime label{font-size:12px;color:#888;font-weight:600}
.log-item{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#666;padding:6px 0;border-bottom:1px solid #f0f0f0}
.log-del{background:none;border:none;color:#ffb3b3;font-size:14px;cursor:pointer;padding:0 3px}
.log-del:hover{color:#FF6B6B}
/* 음악 */
.mtype-btn{padding:7px 13px;border-radius:9px;border:2px solid #eee;background:#fff;font-size:12px;font-weight:700;color:#666;cursor:pointer}
.mtype-btn.on{border-color:#FFB300;background:#FFF8E1;color:#FFB300}
.bv{transition:height .4s ease}
.brain-link{display:flex;align-items:center;gap:11px;padding:11px 13px;background:#FFFBF0;border:2px solid #FFE082;border-radius:13px;text-decoration:none;color:#333;transition:all .15s;margin-bottom:7px}
.brain-link:hover{background:#FFF8E1;border-color:#FFB300}
/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center}
.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:20px;padding:22px;width:90%;max-width:400px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:800;color:#444;margin-bottom:14px}
.modal input{width:100%;padding:10px 12px;border:2px solid #eee;border-radius:10px;font-size:14px;margin-bottom:9px;outline:none;font-family:inherit}
.modal input:focus{border-color:#FFB300}
.mbtns{display:flex;gap:7px;margin-top:3px}
.btn-ok{flex:1;background:#FFB300;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer}
.btn-ok:hover{background:#FF8F00}
.btn-no{flex:1;background:#fff;color:#999;border:2px solid #eee;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer}
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:13px;max-height:300px;overflow-y:auto}
.icon-btn{font-size:22px;border:2px solid transparent;border-radius:8px;padding:4px;cursor:pointer;background:none;text-align:center;transition:all .1s}
.icon-btn:hover{background:#f0f0f0;transform:scale(1.12)}
.icon-btn.on{border-color:#FFB300;background:#FFF8E1}
/* 추가 버튼 */
.add-sm{padding:8px 16px;background:#fff;border:2px dashed #FFB300;border-radius:13px;color:#FFB300;font-size:12px;font-weight:700;cursor:pointer;display:block;margin:0 auto 10px}
.add-sm:hover{background:#FFF8E1}
/* 폭죽 */
.cfti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
.cft{position:absolute;border-radius:2px;animation:cfall linear forwards}
@keyframes cfall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}
.loading{text-align:center;padding:40px;color:#FFB300;font-size:14px;font-weight:700}
/* 백업 */
.backup-btn{width:100%;padding:10px;background:#FFF8E1;border:2px solid #FFB300;border-radius:11px;color:#FFB300;font-size:13px;font-weight:700;cursor:pointer;margin-top:13px}
.backup-btn:hover{background:#FFE082}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-left">
    <span class="hd-icon" id="appIcon" onclick="openIconModal()">📚</span>
    <div class="hd-title" id="appTitle" contenteditable="true" spellcheck="false"
      onblur="saveTitleInline(this)"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">지율이의 미션 체크</div>
  </div>
  <div class="hd-badge" id="syncBadge">🔄 연결중...</div>
</div>

<!-- 미션 페이지 -->
<div class="pg on" id="pg-missions">
  <div class="tab-header"><div class="tabs" id="tabsWrap"></div></div>
  <div class="tab-body" id="tabBody"><div class="loading">🔄 불러오는 중...</div></div>
  <div id="extraContent"></div>
</div>

<!-- 완료 페이지 -->
<div class="pg" id="pg-completed">
  <div id="doneContent"></div>
</div>

<!-- 타이머 페이지 -->
<div class="pg" id="pg-timer">
  <div class="card" style="text-align:center">
    <div class="mode-btns">
      <button class="mbtn on" id="btnSW" onclick="setMode('sw')">⏱ 스톱워치</button>
      <button class="mbtn" id="btnCD" onclick="setMode('cd')">⏰ 카운트다운</button>
    </div>
    <div id="cdSetup" style="display:none">
      <div class="preset-btns">
        <button class="pbtn" onclick="setPre(5,this)">5분</button>
        <button class="pbtn" onclick="setPre(10,this)">10분</button>
        <button class="pbtn" onclick="setPre(15,this)">15분</button>
        <button class="pbtn" onclick="setPre(20,this)">20분</button>
        <button class="pbtn" onclick="setPre(25,this)">25분</button>
        <button class="pbtn" onclick="setPre(30,this)">30분</button>
        <button class="pbtn" onclick="setPre(45,this)">45분</button>
        <button class="pbtn" onclick="setPre(60,this)">60분</button>
      </div>
      <div class="ctime">
        <input type="number" id="cMin" placeholder="분" min="0" max="999" oninput="setCT()">
        <label>분</label>
        <input type="number" id="cSec" placeholder="초" min="0" max="59" oninput="setCT()">
        <label>초</label>
      </div>
    </div>
    <div class="tdisp" id="tDisp">00:00</div>
    <div class="t-btns">
      <button class="tbtn go" id="tBtn" onclick="toggleTimer()">▶ 시작</button>
      <button class="tbtn rst" onclick="resetTimer()">↺ 초기화</button>
    </div>
  </div>
  <div class="card">
    <div style="font-size:12px;font-weight:700;color:#999;margin-bottom:8px">📋 공부 기록</div>
    <div id="tLog"><div style="color:#ccc;font-size:12px;text-align:center;padding:12px">아직 기록이 없어요</div></div>
    <div style="margin-top:9px;font-size:12px;color:#888;display:flex;justify-content:space-between;align-items:center">
      <span>누적 총 공부시간</span>
      <span id="totalMin" style="font-weight:800;color:#FFB300;font-size:14px">0분</span>
    </div>
    <button class="backup-btn" onclick="exportData()">📥 전체 데이터 백업 (JSON 다운로드)</button>
  </div>
</div>

<!-- 음악 페이지 -->
<div class="pg" id="pg-music">
  <div class="card" style="text-align:center;padding:22px 15px">
    <div style="font-size:34px;margin-bottom:5px">🎧</div>
    <div style="font-size:15px;font-weight:800;color:#333;margin-bottom:3px">알파파 집중 음악</div>
    <div style="font-size:11px;color:#999;margin-bottom:18px">공부할 때 집중력을 높여줘요</div>
    <div style="display:flex;align-items:flex-end;justify-content:center;gap:4px;height:46px;margin-bottom:18px">
      <div class="bv" style="width:8px;background:#FFB300;border-radius:4px;height:20px"></div>
      <div class="bv" style="width:8px;background:#FFB300;border-radius:4px;height:35px"></div>
      <div class="bv" style="width:8px;background:#FFB300;border-radius:4px;height:28px"></div>
      <div class="bv" style="width:8px;background:#FFB300;border-radius:4px;height:42px"></div>
      <div class="bv" style="width:8px;background:#FFB300;border-radius:4px;height:18px"></div>
      <div class="bv" style="width:8px;background:#FFB300;border-radius:4px;height:38px"></div>
      <div class="bv" style="width:8px;background:#FFB300;border-radius:4px;height:24px"></div>
    </div>
    <div style="display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:18px">
      <button class="mtype-btn on" onclick="selMusic('alpha',this)">🧠 알파파</button>
      <button class="mtype-btn" onclick="selMusic('rain',this)">🌧 빗소리</button>
      <button class="mtype-btn" onclick="selMusic('forest',this)">🌲 숲소리</button>
      <button class="mtype-btn" onclick="selMusic('white',this)">🌊 화이트노이즈</button>
    </div>
    <button class="tbtn go" id="mPlayBtn" onclick="toggleMusic()" style="width:130px;margin:0 auto">▶ 재생</button>
    <div style="margin-top:15px">
      <div style="font-size:11px;color:#888;margin-bottom:5px">볼륨</div>
      <input type="range" id="volSlider" min="0" max="100" value="50" oninput="setVol(this.value)" style="width:190px;accent-color:#FFB300">
    </div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:800;color:#444;margin-bottom:11px">🧠 뇌파별 유튜브 음악</div>
    <div style="font-size:11px;color:#999;margin-bottom:11px">버튼을 누르면 유튜브에서 바로 열려요 🎧</div>
    <a href="https://youtu.be/qVyiN-OFdIc" target="_blank" class="brain-link"><span style="font-size:24px">⚡</span><div><div style="font-size:13px;font-weight:800">18Hz 베타파</div><div style="font-size:11px;color:#999;margin-top:2px">집중력 · 각성 · 문제해결</div></div><span style="font-size:17px;margin-left:auto">▶</span></a>
    <a href="https://youtu.be/943mnY53C4g" target="_blank" class="brain-link"><span style="font-size:24px">🧠</span><div><div style="font-size:13px;font-weight:800">15Hz SMR파</div><div style="font-size:11px;color:#999;margin-top:2px">차분한 집중 · 학습 효율</div></div><span style="font-size:17px;margin-left:auto">▶</span></a>
    <a href="https://youtu.be/j6A2l63W1Dk" target="_blank" class="brain-link"><span style="font-size:24px">💡</span><div><div style="font-size:13px;font-weight:800">6Hz 세타파</div><div style="font-size:11px;color:#999;margin-top:2px">깊은 사색 · 암기</div></div><span style="font-size:17px;margin-left:auto">▶</span></a>
    <a href="https://youtu.be/ObjVJjcH5t0" target="_blank" class="brain-link"><span style="font-size:24px">😴</span><div><div style="font-size:13px;font-weight:800">1.8Hz 델타파</div><div style="font-size:11px;color:#999;margin-top:2px">깊은 수면 · 휴식</div></div><span style="font-size:17px;margin-left:auto">▶</span></a>
  </div>
</div>

<!-- 하단 네비 -->
<div class="nav">
  <button class="nav-btn on" id="nv-missions" onclick="showPg('missions')"><span class="ni">📚</span>미션</button>
  <button class="nav-btn" id="nv-completed" onclick="showPg('completed')"><span class="ni">🏆</span>완료</button>
  <button class="nav-btn" id="nv-timer" onclick="showPg('timer')"><span class="ni">⏱</span>타이머</button>
  <button class="nav-btn" id="nv-music" onclick="showPg('music')"><span class="ni">🎧</span>음악</button>
</div>

<!-- 미션 모달 -->
<div class="modal-bg" id="missionModal">
  <div class="modal">
    <h2 id="mModalTitle">✏️ 새 미션 만들기</h2>
    <input id="fName" placeholder="문제집 이름 (예: 수학의 힘 3권)" maxlength="20">
    <input id="fSubject" placeholder="과목 (예: 수학, 국어, 영어)">
    <input id="fStart" type="number" placeholder="시작 페이지" min="1" value="1">
    <input id="fEnd" type="number" placeholder="끝 페이지" min="1" value="50">
    <input id="fDate" type="date">
    <div class="mbtns">
      <button class="btn-no" onclick="closeMM()">취소</button>
      <button class="btn-ok" id="mModalOk" onclick="submitMission()">만들기 🎯</button>
    </div>
    <div id="delRow" style="display:none;margin-top:9px;text-align:center">
      <button onclick="delMission()" style="background:none;border:none;color:#FF6B6B;font-size:12px;font-weight:700;cursor:pointer">🗑️ 이 미션 삭제하기</button>
    </div>
  </div>
</div>

<!-- 아이콘 모달 -->
<div class="modal-bg" id="iconModal">
  <div class="modal">
    <h2>아이콘 선택</h2>
    <div class="icon-grid" id="iconGrid"></div>
    <div class="mbtns"><button class="btn-no" onclick="closeIconModal()">닫기</button></div>
  </div>
</div>

<div class="cfti" id="cfti"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import{getDatabase,ref,onValue,set,get}from"https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const FB={apiKey:"AIzaSyChtYe5du1SjGUK7cMyb49DPvXosM-RRiI",authDomain:"stuy-9b76b.firebaseapp.com",databaseURL:"https://stuy-9b76b-default-rtdb.firebaseio.com",projectId:"stuy-9b76b",storageBucket:"stuy-9b76b.firebasestorage.app",messagingSenderId:"268649375648",appId:"1:268649375648:web:3e47edccfec9b613c0e6c5"};
const db=getDatabase(initializeApp(FB));
const dbRef=()=>ref(db,'studyApp');
function fbSave(d){set(dbRef(),d).catch(e=>console.error(e));}

// ── Firebase ──────────────────────────────────
function norm(d){
  if(!d)return{missions:[],activeIdx:0,appTitle:'지율이의 미션 체크',appIcon:'📚'};
  const raw=d.missions||[];
  return{
    missions:Object.values(raw).map(m=>({...m,
      pages:Object.values(m.pages||[]),
      dates1:Object.values(m.dates1||[]),
      dates2:Object.values(m.dates2||[])
    })),
    activeIdx:d.activeIdx||0,
    appTitle:d.appTitle||'지율이의 미션 체크',
    appIcon:d.appIcon||'📚'
  };
}
function saveAll(){
  fbSave({missions,activeIdx,appTitle,appIcon});
  badge('🔄 저장중...');
  setTimeout(()=>badge('☁️ 동기화됨'),1000);
}
function badge(t){const el=document.getElementById('syncBadge');if(el)el.textContent=t;}

fbLoad(raw=>{
  const d=norm(raw);
  missions=d.missions;activeIdx=d.activeIdx;appTitle=d.appTitle;appIcon=d.appIcon;
  applyMeta();render();badge('☁️ 동기화됨');
});
setInterval(()=>{
  badge('🔄 업데이트중...');
  get(dbRef()).then(s=>{
    const d=norm(s.val());
    missions=d.missions;activeIdx=d.activeIdx;appTitle=d.appTitle;appIcon=d.appIcon;
    applyMeta();render();badge('☁️ 동기화됨');
  }).catch(()=>badge('❌ 연결오류'));
},30000);

// ── 유틸 ──────────────────────────────────────
function applyMeta(){
  document.getElementById('appIcon').textContent=appIcon;
  document.getElementById('appTitle').textContent=appTitle;
}
function th(i){return THEMES[i%THEMES.length];}
function char(i){return CHARS[i%CHARS.length];}
function trp(i){return TRPS[i%TRPS.length];}
function stats(m){
  const t=m.pages.length,d1=m.pages.filter(p=>p===1).length,d2=m.pages.filter(p=>p===2).length;
  return{t,d1,d2,pct:t?Math.round(((d1+d2)/t)*100):0};
}
function fd(ts){if(!ts)return'';const d=new Date(ts);return`${d.getMonth()+1}/${d.getDate()}`;}
function isDone(m){return m.pages.length>0&&m.pages.every(p=>p===2);}

// ── 앱 이름 인라인 수정 ───────────────────────
window.saveTitleInline=el=>{
  const v=el.textContent.trim();
  if(v){appTitle=v;saveAll();}else el.textContent=appTitle;
};

// ── 아이콘 모달 ───────────────────────────────
window.openIconModal=()=>{
  const g=document.getElementById('iconGrid');g.innerHTML='';
  ICONS.forEach(ic=>{
    const b=document.createElement('button');
    b.className='icon-btn'+(ic===appIcon?' on':'');
    b.textContent=ic;
    b.onclick=()=>{appIcon=ic;saveAll();applyMeta();closeIconModal();};
    g.appendChild(b);
  });
  document.getElementById('iconModal').classList.add('on');
};
window.closeIconModal=()=>document.getElementById('iconModal').classList.remove('on');

// ── 페이지 전환 ───────────────────────────────
window.showPg=name=>{
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  document.getElementById('nv-'+name).classList.add('on');
  if(name==='completed')renderDone();
  if(name==='timer')renderLog();
};

// ── 블럭 HTML ─────────────────────────────────
function blkHtml(state,page,i,d1s,d2s){
  const ts=state===1?(d1s&&d1s[i]):state===2?(d2s&&d2s[i]):null;
  const dt=ts?fd(ts):'';
  const dc=state===1?'#B8860B':'#2D8600';
  if(state===2)return`<div class="blk d2" id="blk${i}" onclick="toggleBlk(${i})"><span class="trp">${trp(i)}</span></div>`;
  if(state===1)return`<div class="blk d1" id="blk${i}" onclick="toggleBlk(${i})"><span class="bdt" style="color:${dc}">${dt||'?'}</span></div>`;
  return`<div class="blk" id="blk${i}" onclick="toggleBlk(${i})"><span style="font-size:11px;color:#ccc">${page}</span></div>`;
}

// ── 렌더 ──────────────────────────────────────
function renderTabs(){
  const w=document.getElementById('tabsWrap');w.innerHTML='';
  const active=missions.filter(m=>!isDone(m));
  active.forEach(m=>{
    const i=missions.indexOf(m),ti=active.indexOf(m),t=th(ti);
    const el=document.createElement('div');
    el.className='tab'+(i===activeIdx?' on':'');
    if(i===activeIdx){el.style.color=t.tab;el.style.borderBottomColor=t.tab;}
    el.textContent=m.name;el.onclick=()=>{activeIdx=i;saveAll();renderBody();};
    w.appendChild(el);
  });
  const add=document.createElement('div');
  add.className='tab-add';add.textContent='+';add.onclick=openMM;
  w.appendChild(add);
}

function renderBody(){
  const body=document.getElementById('tabBody');
  const extra=document.getElementById('extraContent');
  const active=missions.filter(m=>!isDone(m));
  if(!active.length){
    body.innerHTML=`<div style="text-align:center;padding:28px 0"><div style="font-size:44px;margin-bottom:10px">🎯</div><div style="font-size:14px;font-weight:700;color:#444">첫 번째 미션을 만들어봐요!</div></div>`;
    extra.innerHTML=`<button class="add-sm" onclick="openMM()">+ 새 미션 만들기</button>`;
    return;
  }
  if(activeIdx>=missions.length||isDone(missions[activeIdx]))activeIdx=missions.indexOf(active[0]);
  const m=missions[activeIdx];
  const {t,d1,d2,pct}=stats(m);
  const ti=active.indexOf(m),theme=th(ti);
  const gd=m.goalDate?Math.ceil((new Date(m.goalDate)-new Date())/86400000):null;

  let bhtml='';
  m.pages.forEach((s,i)=>{bhtml+=blkHtml(s,m.startPage+i,i,m.dates1,m.dates2);});

  body.innerHTML=`
    <div class="mascot-wrap">
      <div class="mascot-float">${char(ti)}</div>
      ${pct===0?`<br><input class="gift-inp" placeholder="목표 달성하면 뭐 받고 싶어?" maxlength="30" value="${m.giftMsg||''}" oninput="saveGift(this.value)">`:``}
    </div>
    <div style="height:14px"></div>
    <div style="border-radius:11px;border:1.5px solid ${theme.border};background:${theme.light};padding:13px;margin-bottom:13px">
      <div class="prog-row">
        <div class="prog-label">${m.subject?m.subject+' · ':''}${m.name}</div>
        <div class="prog-pct" style="color:${theme.tab}">${pct}%</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="mainBar" style="width:${pct}%;background:${theme.prog}"></div></div>
      <div class="sub-bars">
        <div class="sbi"><div class="sbb"><div class="sbf" style="background:${theme.tab};opacity:.4;width:${Math.round(((d1+d2)/t)*100)}%"></div></div>완료 ${d1+d2}/${t}</div>
        <div class="sbi"><div class="sbb"><div class="sbf" style="background:${theme.tab};width:${Math.round((d2/t)*100)}%"></div></div>오답/복습 ${d2}/${t}</div>
      </div>
    </div>
    ${m.goalDate?`<div class="card goal-card" style="margin-bottom:13px"><div class="goal-row"><div><div style="font-size:13px;font-weight:700;color:#8B6914">🎯 목표 날짜</div><div style="font-size:11px;color:#B8860B;margin-top:2px">${m.goalDate}</div></div><div style="font-size:17px;font-weight:800;color:#D4A000">${gd>=0?'D-'+gd:'기간 지남!'}</div></div></div>`:''}
    <div class="legend">
      <div class="li"><div class="ld l0"></div>미완료</div>
      <div class="li"><div class="ld l1"></div>완료</div>
      <div class="li"><div class="ld l2"></div>오답/복습</div>
    </div>
    <div class="grid-title">
      <span>📄 ${m.startPage}~${m.startPage+t-1}쪽</span>
      <button class="edit-btn" style="color:${theme.tab};background:${theme.light}" onclick="openEditMM()">✏️ 수정</button>
    </div>
    <div class="blocks">${bhtml}</div>`;

  extra.innerHTML=`<button class="add-sm" onclick="openMM()">+ 새 미션 만들기</button>`;
}

function render(){renderTabs();renderBody();}
window.render=render;

// ── 블럭 클릭 ─────────────────────────────────
window.toggleBlk=i=>{
  const m=missions[activeIdx];
  if(!m.dates1)m.dates1=[];if(!m.dates2)m.dates2=[];
  const now=Date.now();
  m.pages[i]=(m.pages[i]+1)%3;
  if(m.pages[i]===1){m.dates1[i]=now;m.dates2[i]=null;}
  else if(m.pages[i]===2){m.dates2[i]=now;}
  else{m.dates1[i]=null;m.dates2[i]=null;}
  const el=document.getElementById('blk'+i);
  if(el){el.outerHTML=blkHtml(m.pages[i],m.startPage+i,i,m.dates1,m.dates2);const ne=document.getElementById('blk'+i);if(ne){ne.classList.add('pop');setTimeout(()=>ne.classList.remove('pop'),300);}}
  playS(m.pages[i]);saveAll();
  const {t,d1,d2,pct}=stats(m);
  const bar=document.getElementById('mainBar');if(bar)bar.style.width=pct+'%';
  const pe=document.querySelector('.prog-pct');if(pe)pe.textContent=pct+'%';
  const sfs=document.querySelectorAll('.sbf');
  if(sfs[0])sfs[0].style.width=Math.round(((d1+d2)/t)*100)+'%';
  if(sfs[1])sfs[1].style.width=Math.round((d2/t)*100)+'%';
  const sis=document.querySelectorAll('.sbi');
  if(sis[0])sis[0].lastChild.textContent=` 완료 ${d1+d2}/${t}`;
  if(sis[1])sis[1].lastChild.textContent=` 오답/복습 ${d2}/${t}`;
  if(isDone(m)){setTimeout(()=>{confetti();setTimeout(render,1500);},300);}
};

window.saveGift=v=>{if(missions[activeIdx]){missions[activeIdx].giftMsg=v;saveAll();}};

// ── 완료 미션 ─────────────────────────────────
function renderDone(){
  const c=document.getElementById('doneContent');
  const done=missions.filter(isDone);
  if(!done.length){c.innerHTML=`<div style="text-align:center;padding:40px;color:#ccc"><div style="font-size:46px;margin-bottom:11px">🏆</div><div>완료된 미션이 없어요!<br>열심히 공부해봐요 💪</div></div>`;return;}
  c.innerHTML=`<div style="font-size:13px;font-weight:700;color:#888;margin-bottom:11px">🏆 완료한 미션 ${done.length}개</div>`+
    done.map(m=>{
      const{t}=stats(m);
      const last=m.dates2?Math.max(...m.dates2.filter(Boolean)):null;
      return`<div class="done-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><div style="font-size:14px;font-weight:800;color:#333">${m.subject?`[${m.subject}] `:''}${m.name}</div><div style="background:#C8F5A0;color:#2E7D32;font-size:11px;font-weight:700;padding:3px 9px;border-radius:9px">✅ 완료</div></div><div style="font-size:11px;color:#888;display:flex;gap:11px;flex-wrap:wrap"><span>📄 ${m.startPage}~${m.startPage+t-1}쪽</span>${last?`<span>📅 ${fd(last)}</span>`:''} ${m.giftMsg?`<span>🎁 ${m.giftMsg}</span>`:''}</div></div>`;
    }).join('');
}

// ── 타이머 ────────────────────────────────────
window.setMode=mode=>{
  tMode=mode;resetTimer();
  document.getElementById('btnSW').className='mbtn'+(mode==='sw'?' on':'');
  document.getElementById('btnCD').className='mbtn'+(mode==='cd'?' on':'');
  document.getElementById('cdSetup').style.display=mode==='cd'?'block':'none';
};
window.setPre=(min,btn)=>{
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');cdTarget=min*60;tSec=cdTarget;updTDisp();
  document.getElementById('cMin').value='';document.getElementById('cSec').value='';
};
window.setCT=()=>{
  const m=parseInt(document.getElementById('cMin').value)||0,s=parseInt(document.getElementById('cSec').value)||0;
  cdTarget=m*60+s;tSec=cdTarget;updTDisp();
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
};
window.toggleTimer=()=>{
  if(tRun){
    clearInterval(tIv);tRun=false;
    document.getElementById('tBtn').textContent='▶ 계속';document.getElementById('tBtn').className='tbtn go';
    document.getElementById('tDisp').className='tdisp';
  }else{
    if(tMode==='cd'&&tSec<=0){tSec=cdTarget;if(tSec<=0){alert('시간을 설정해주세요!');return;}}
    tRun=true;document.getElementById('tBtn').textContent='⏸ 일시정지';document.getElementById('tBtn').className='tbtn stop';
    document.getElementById('tDisp').className='tdisp run';
    const st=Date.now()-(tMode==='sw'?tSec*1000:(cdTarget-tSec)*1000);
    tIv=setInterval(()=>{
      if(tMode==='sw'){tSec=Math.floor((Date.now()-st)/1000);}
      else{tSec=Math.max(0,cdTarget-Math.floor((Date.now()-st)/1000));if(tSec<=0){timerDone();return;}}
      updTDisp();
    },500);
  }
};
function timerDone(){
  clearInterval(tIv);tRun=false;tSec=0;updTDisp();
  document.getElementById('tDisp').className='tdisp done';
  document.getElementById('tBtn').textContent='▶ 시작';document.getElementById('tBtn').className='tbtn go';
  playAlarm();
  const mins=Math.round(cdTarget/60);
  tLogs.unshift({mins,ts:Date.now()});
  if(tLogs.length>100)tLogs.pop();
  localStorage.setItem('tlogs',JSON.stringify(tLogs));
  renderLog();
}
window.resetTimer=()=>{
  clearInterval(tIv);tRun=false;tSec=tMode==='cd'?cdTarget:0;updTDisp();
  document.getElementById('tBtn').textContent='▶ 시작';document.getElementById('tBtn').className='tbtn go';
  document.getElementById('tDisp').className='tdisp';
};
function updTDisp(){
  const s=tSec,h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  const el=document.getElementById('tDisp');if(!el)return;
  el.textContent=h>0?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}
function renderLog(){
  const el=document.getElementById('tLog');if(!el)return;
  if(!tLogs.length){el.innerHTML=`<div style="color:#ccc;font-size:12px;text-align:center;padding:11px">아직 기록이 없어요</div>`;document.getElementById('totalMin').textContent='0분';return;}
  el.innerHTML=tLogs.map((l,idx)=>{
    const t=new Date(l.ts);
    return`<div class="log-item"><span>⏰ ${l.mins}분 집중</span><span style="display:flex;align-items:center;gap:7px"><span style="color:#aaa;font-size:11px">${t.getMonth()+1}/${t.getDate()} ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}</span><button class="log-del" onclick="delLog(${idx})">✕</button></span></div>`;
  }).join('');
  const tot=tLogs.reduce((a,l)=>a+(l.mins||0),0);
  document.getElementById('totalMin').textContent=tot>=60?`${Math.floor(tot/60)}시간 ${tot%60}분`:tot+'분';
}
window.delLog=idx=>{tLogs.splice(idx,1);localStorage.setItem('tlogs',JSON.stringify(tLogs));renderLog();};

// ── 백업 ──────────────────────────────────────
window.exportData=()=>{
  const data={missions,appTitle,appIcon,timerLogs:tLogs,exportedAt:new Date().toLocaleString('ko-KR')};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`미션체크_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
};

// ── 음악 ──────────────────────────────────────
const AC=window.AudioContext||window.webkitAudioContext;let ac=null;
function getAC(){if(!ac)ac=new AC();return ac;}
window.selMusic=(type,btn)=>{mType=type;document.querySelectorAll('.mtype-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');if(mPlay){stopM();startM();}};
window.toggleMusic=()=>mPlay?stopM():startM();
function startM(){
  try{
    const ctx=getAC();mGain=ctx.createGain();mGain.gain.value=(parseInt(document.getElementById('volSlider').value)/100)*0.3;mGain.connect(ctx.destination);mNodes=[];
    if(mType==='alpha'){[440,450].forEach((f,i)=>{const o=ctx.createOscillator(),pan=ctx.createStereoPanner();pan.pan.value=i===0?-1:1;o.frequency.value=f;o.type='sine';const g=ctx.createGain();g.gain.value=0.4;o.connect(g);g.connect(pan);pan.connect(mGain);o.start();mNodes.push(o);});const d=ctx.createOscillator();d.frequency.value=220;d.type='sine';const dg=ctx.createGain();dg.gain.value=0.15;d.connect(dg);dg.connect(mGain);d.start();mNodes.push(d);}
    else{const buf=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate);const data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;const f=ctx.createBiquadFilter();f.type=mType==='rain'?'bandpass':'lowpass';f.frequency.value=mType==='rain'?800:600;src.connect(f);f.connect(mGain);src.start();mNodes.push(src);}
    mPlay=true;document.getElementById('mPlayBtn').textContent='⏹ 정지';document.getElementById('mPlayBtn').className='tbtn stop';startViz();
  }catch(e){}
}
function stopM(){mNodes.forEach(n=>{try{n.stop();}catch(e){}});mNodes=[];if(mGain){mGain.disconnect();mGain=null;}mPlay=false;document.getElementById('mPlayBtn').textContent='▶ 재생';document.getElementById('mPlayBtn').className='tbtn go';stopViz();}
window.setVol=v=>{if(mGain)mGain.gain.value=(v/100)*0.3;};
function startViz(){const bs=document.querySelectorAll('.bv');vizIv=setInterval(()=>{bs.forEach(b=>{b.style.height=(10+Math.random()*38)+'px';});},400);}
function stopViz(){clearInterval(vizIv);[20,35,28,42,18,38,24].forEach((h,i)=>{const bs=document.querySelectorAll('.bv');if(bs[i])bs[i].style.height=h+'px';});}

// ── 사운드 ────────────────────────────────────
function playS(s){try{const ctx=getAC(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);if(s===0){o.frequency.value=300;g.gain.setValueAtTime(.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);o.type='sine';}else if(s===1){o.frequency.setValueAtTime(523,ctx.currentTime);o.frequency.setValueAtTime(659,ctx.currentTime+.1);g.gain.setValueAtTime(.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);o.type='triangle';}else{[523,659,784,1047].forEach((f,i)=>{const o2=ctx.createOscillator(),g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.frequency.value=f;o2.type='sine';const t=ctx.currentTime+i*.08;g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.18,t+.04);g2.gain.exponentialRampToValueAtTime(.001,t+.25);o2.start(t);o2.stop(t+.3);});return;}o.start(ctx.currentTime);o.stop(ctx.currentTime+.4);}catch(e){}}
function playAlarm(){try{const ctx=getAC();[[880,0],[988,.2],[1047,.4],[880,.7],[1047,.9],[1175,1.1]].forEach(([f,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';const t=ctx.currentTime+d;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.25,t+.05);g.gain.exponentialRampToValueAtTime(.001,t+.35);o.start(t);o.stop(t+.4);});}catch(e){}}
function confetti(){const c=document.getElementById('cfti');c.innerHTML='';const cols=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#CC5DE8'];for(let i=0;i<80;i++){const p=document.createElement('div');p.className='cft';p.style.left=Math.random()*100+'vw';p.style.background=cols[~~(Math.random()*cols.length)];const z=(8+Math.random()*8)+'px';p.style.width=z;p.style.height=z;p.style.animationDuration=(1.5+Math.random()*2)+'s';p.style.animationDelay=Math.random()*.8+'s';p.style.borderRadius=Math.random()>.5?'50%':'2px';c.appendChild(p);}setTimeout(()=>{c.innerHTML='';},4000);}

// ── 미션 모달 ─────────────────────────────────
function openMM(){editMode=false;document.getElementById('mModalTitle').textContent='✏️ 새 미션 만들기';document.getElementById('mModalOk').textContent='만들기 🎯';document.getElementById('delRow').style.display='none';['fName','fSubject','fDate'].forEach(id=>document.getElementById(id).value='');document.getElementById('fStart').value='1';document.getElementById('fEnd').value='50';document.getElementById('missionModal').classList.add('on');}
window.openMM=openMM;
window.openEditMM=()=>{
  const m=missions[activeIdx];if(!m)return;editMode=true;
  document.getElementById('mModalTitle').textContent='🛠️ 미션 수정하기';
  document.getElementById('mModalOk').textContent='저장하기 ✅';
  document.getElementById('delRow').style.display='block';
  document.getElementById('fName').value=m.name;document.getElementById('fSubject').value=m.subject||'';
  document.getElementById('fStart').value=m.startPage;document.getElementById('fEnd').value=m.startPage+m.pages.length-1;
  document.getElementById('fDate').value=m.goalDate||'';
  document.getElementById('missionModal').classList.add('on');
};
window.closeMM=()=>document.getElementById('missionModal').classList.remove('on');
window.submitMission=()=>editMode?updateM():createM();
function createM(){
  const name=document.getElementById('fName').value.trim(),subject=document.getElementById('fSubject').value.trim(),start=parseInt(document.getElementById('fStart').value)||1,end=parseInt(document.getElementById('fEnd').value)||50,goalDate=document.getElementById('fDate').value;
  if(!name){alert('문제집 이름을 입력해주세요!');return;}if(end<start){alert('끝 페이지가 시작 페이지보다 작아요!');return;}
  missions.push({name,subject,startPage:start,goalDate,pages:new Array(Math.min(end-start+1,300)).fill(0),dates1:[],dates2:[]});
  activeIdx=missions.length-1;saveAll();closeMM();render();
}
function updateM(){
  const name=document.getElementById('fName').value.trim(),subject=document.getElementById('fSubject').value.trim(),start=parseInt(document.getElementById('fStart').value)||1,end=parseInt(document.getElementById('fEnd').value)||50,goalDate=document.getElementById('fDate').value;
  if(!name){alert('문제집 이름을 입력해주세요!');return;}if(end<start){alert('끝 페이지가 시작 페이지보다 작아요!');return;}
  const nt=Math.min(end-start+1,300),old=missions[activeIdx];
  missions[activeIdx]={...old,name,subject,startPage:start,goalDate,pages:new Array(nt).fill(0).map((_,i)=>old.pages[i]||0),dates1:(old.dates1||[]).slice(0,nt),dates2:(old.dates2||[]).slice(0,nt)};
  saveAll();closeMM();render();
}
window.delMission=()=>{if(!confirm('이 미션을 삭제할까요?'))return;missions.splice(activeIdx,1);activeIdx=Math.max(0,activeIdx-1);saveAll();closeMM();render();};

document.getElementById('missionModal').onclick=e=>{if(e.target===e.currentTarget)closeMM();};
document.getElementById('iconModal').onclick=e=>{if(e.target===e.currentTarget)closeIconModal();};
</script>
